version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wardis-postgres-dev
    environment:
      POSTGRES_USER: wardis_user
      POSTGRES_PASSWORD: wardis_password
      POSTGRES_DB: wardis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wardis_user -d wardis_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wardis-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: wardis-nats-dev
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/varz"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-06-29T01-20-47Z
    container_name: wardis-minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:1.9.0-alpine
    container_name: wardis-mediamtx-dev
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "9997:9997"
    environment:
      MTX_API: "yes"
      MTX_APIADDRESS: ":9997"
      MTX_WEBRTC: "yes"
      MTX_WEBRTCADDRESS: ":8889"
      MTX_AUTHMETHOD: "http"
      MTX_AUTHHTTPADDRESS: "http://host.docker.internal:8080/cameras/auth"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
