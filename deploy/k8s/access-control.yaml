apiVersion: apps/v1
kind: Deployment
metadata:
  name: wardis-access-control
  namespace: wardis
  labels:
    app: wardis-access-control
    component: microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wardis-access-control
  template:
    metadata:
      labels:
        app: wardis-access-control
        component: microservice
    spec:
      containers:
        - name: wardis-access-control
          image: wardis-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: wardis-config
            - secretRef:
                name: wardis-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: wardis-access-control-svc
  namespace: wardis
  labels:
    app: wardis-access-control
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: wardis-access-control
  type: ClusterIP
