apiVersion: apps/v1
kind: Deployment
metadata:
  name: wardis-auth
  namespace: wardis
  labels:
    app: wardis-auth
    component: microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wardis-auth
  template:
    metadata:
      labels:
        app: wardis-auth
        component: microservice
    spec:
      containers:
        - name: wardis-auth
          image: wardis-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: wardis-config
            - secretRef:
                name: wardis-secrets
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: wardis-auth-svc
  namespace: wardis
  labels:
    app: wardis-auth
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: wardis-auth
  type: ClusterIP
